<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Certificate - OS From First Principles</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="brand-mark">OS</span>
      <span><strong>OS First Principles</strong></span>
    </a>
  </header>
  
  <main class="certificate">
    <div class="certificate-card">
      <h1>Certificate of Completion</h1>
      <p class="awarded">Awarded to</p>

      <div class="date">June 2025</div>
      <div class="signature">
        <div>Instructor Signature</div>
        <div>OS First Principles</div>
      </div>
      <button class="button" onclick="window.print()">Print Certificate</button>
      <button class="button" onclick="window.location.href='index.html'">Back to Course</button>
    </div>
  </main>

</html>
